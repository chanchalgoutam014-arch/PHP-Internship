<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body >

    <form action="">
        <table border="2px" align="center" cellpadding="5px" cellspacing="10px">
            <tr>
                <th colspan="4">Registration Form</th>
            </tr>

            <tr>
                <td>Student Name</td>
                <td><input type="text" placeholder="First Name"></td>
                <td><input type="text" placeholder="Middle Name"></td>
                <td><input type="text" placeholder="Last Name"></td>
            </tr>

            <tr>
                <td>Father's Name</td>
                <td><input type="text" name="father_name" placeholder="Enter your father's Name"></td>
                <td>Mother's Name</td>
                <td><input type="text" name="mother_name" placeholder="Enter your Mother's Name"></td>
            </tr>

    
            <tr>
                <td>Date of Birth</td>
                <td><input type="date" name="dob"></td>
                <td>Gender</td>
                <td>
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </td>
            </tr>

            <tr>
                <td>Category</td>
                <td>
                    <label><input type="radio" name="category" value="gen"> Gen</label>
                    <label><input type="radio" name="category" value="obc"> OBC</label>
                    <label><input type="radio" name="category" value="scst"> SC/ST</label>
                </td>
                <td>Handicapped</td>
                <td>
                    <label><input type="radio" name="handicapped" value="yes"> Yes</label>
                    <label><input type="radio" name="handicapped" value="no"> No</label>
                </td>
            </tr>

            <tr>
                <td>Ex-Serviceman</td>
                <td>
                    <label><input type="radio" name="ex_serviceman" value="yes"> Yes</label>
                    <label><input type="radio" name="ex_serviceman" value="no"> NO</label>
                </td>
                <td>EWS</td>
                <td>
                    <label><input type="radio" name="ews" value="yes"> Yes</label>
                    <label><input type="radio" name="ews" value="no"> No</label>
                </td>
            </tr>

            <tr>
                <td>Email ID</td>
                <td><input type="email" name="email"></td>
                <td>Mobile No.</td>
                <td><input type="tel" name="mobile"></td>
            </tr>


            <tr>
                <td>State</td>
                <td>
                    <select name="state">
                        <option value="">Select any One</option>
                        <option value="Punjab">Punjab</option>
                        <option value="bihar">Bihar</option>
                        <option value="delhi">Delhi</option>
                        <option value="gujarat">Gujarat</option>
                        <option value="maharashtra">Maharashtra</option>
                        <option value="uttar-pradesh">Uttar Pradesh</option>
                    </select>
                </td>
                <td>Upload Signature</td>
                <td><input type="file" name="signature" accept="image/*"></td>
            </tr>

            <tr>
                <td colspan="4">
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
